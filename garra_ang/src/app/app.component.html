<div class="flex min-h-screen">
  @if (sessaoService.estaAutenticado()) {
    <aside
      class="flex w-60 shrink-0 flex-col border-r border-indigo-100 bg-white/90 px-4 py-6 backdrop-blur"
    >
      <a routerLink="/" class="mb-8 flex items-center gap-2 px-2 text-lg font-bold text-indigo-900">
        <span class="text-xl">🎓</span>
        Garra
      </a>

      <nav class="flex flex-1 flex-col gap-1 text-sm">
        <a
          routerLink="/financeiro/transacoes"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
          class="rounded-lg px-3 py-2 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700"
          >Transações</a
        >
        <a
          routerLink="/financeiro/saidas"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
          class="rounded-lg px-3 py-2 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700"
          >Pagamentos</a
        >
        <a
          routerLink="/alunos"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
          class="rounded-lg px-3 py-2 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700"
          >Alunos</a
        >
        <a
          routerLink="/professores"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
          class="rounded-lg px-3 py-2 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700"
          >Professores</a
        >
      </nav>

      <button
        type="button"
        (click)="sair()"
        class="mt-4 rounded-lg border border-gray-300 px-3 py-2 text-left text-sm text-gray-600 hover:bg-gray-50"
      >
        Sair
      </button>
    </aside>
  }

  <main class="min-w-0 flex-1">
    <router-outlet></router-outlet>
  </main>
</div>
