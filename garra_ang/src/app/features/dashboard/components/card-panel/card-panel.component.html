@if (resumo$ | async; as resumo) {
  <ui-card>
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <p class="text-caption font-medium text-gray-500">Conta Corrente</p>
        @if (sessaoService.login(); as login) {
          <p class="text-caption text-gray-400">{{ login }}</p>
        }
        <p class="mt-1 text-heading font-bold text-gray-900">{{ resumo.saldoAtual | currency: 'BRL' }}</p>
      </div>

      @if (sessaoService.isAdmin()) {
        <div class="flex gap-2">
          <ui-button variant="secondary" [routerLink]="['/financeiro/saidas/novo']">Nova Saída</ui-button>
          <ui-button variant="primary" [routerLink]="['/financeiro/entradas/novo']">Nova Entrada</ui-button>
        </div>
      }
    </div>
  </ui-card>
}
