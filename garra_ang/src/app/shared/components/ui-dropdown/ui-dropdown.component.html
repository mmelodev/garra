<div class="relative inline-block text-left">
  <button
    type="button"
    (click)="alternar()"
    [attr.aria-expanded]="aberto()"
    aria-haspopup="listbox"
    class="flex items-center gap-2 rounded-control border border-gray-200 bg-white px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50"
  >
    {{ selecionado?.label ?? placeholder() }}
    <svg
      class="h-4 w-4 text-gray-400 transition-transform"
      [class.rotate-180]="aberto()"
      viewBox="0 0 20 20"
      fill="currentColor"
    >
      <path
        fill-rule="evenodd"
        d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
        clip-rule="evenodd"
      />
    </svg>
  </button>

  @if (aberto()) {
    <ul
      role="listbox"
      class="animate-fade-in absolute right-0 z-10 mt-2 min-w-[10rem] origin-top-right rounded-control border border-gray-100 bg-white py-1 shadow-card"
    >
      @for (opcao of options(); track opcao.value) {
        <li>
          <button
            type="button"
            role="option"
            [attr.aria-selected]="opcao.value === value()"
            (click)="selecionar(opcao)"
            [class.bg-indigo-50]="opcao.value === value()"
            [class.text-indigo-700]="opcao.value === value()"
            class="block w-full px-3 py-2 text-left text-sm text-gray-700 transition-colors hover:bg-indigo-50 hover:text-indigo-700"
          >
            {{ opcao.label }}
          </button>
        </li>
      }
    </ul>
  }
</div>
