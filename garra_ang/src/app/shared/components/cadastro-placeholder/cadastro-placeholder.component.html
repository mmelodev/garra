<section class="mx-auto max-w-2xl p-6">
  <div class="rounded-2xl border border-dashed border-indigo-200 bg-indigo-50/40 p-10 text-center">
    <span class="text-4xl">🚧</span>
    <h1 class="mt-3 text-lg font-semibold text-indigo-900">Cadastro de {{ titulo }}</h1>
    <p class="mt-2 text-sm text-gray-600">
      Este formulário ainda está em construção — em breve será possível cadastrar
      {{ titulo | lowercase }} diretamente por aqui.
    </p>
    <a
      [routerLink]="voltarPara"
      class="mt-6 inline-block rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700"
    >
      Voltar
    </a>
  </div>
</section>
